<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Studio Vanilla</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                    </div>
                    <h1 class="logo-text">Motion Studio</h1>
                </div>
                <p class="subtitle">Vanilla JS Generator</p>
            </div>

            <div class="sidebar-content">
                <!-- Element Selection -->
                <section class="control-section">
                    <label class="section-label">Element Type</label>
                    <div class="element-grid" id="element-selector">
                        <button class="element-btn active" data-type="card" title="Card">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                        </button>
                        <button class="element-btn" data-type="button" title="Button">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 5v16"/></svg>
                        </button>
                        <button class="element-btn" data-type="menu" title="Menu">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                        </button>
                        <button class="element-btn" data-type="text" title="Text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
                        </button>
                        <button class="element-btn" data-type="icon" title="Icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                        </button>
                    </div>
                </section>

                <!-- Animation Type -->
                <section class="control-section">
                    <label class="section-label">Animation Type</label>
                    <div class="animation-grid" id="animation-selector">
                        <!-- Populated by JS -->
                    </div>
                </section>

                <!-- Parameters -->
                <section class="control-section">
                    <label class="section-label">Parameters</label>
                    
                    <div class="param-group">
                        <div class="param-header">
                            <span>Duration</span>
                            <span id="duration-val" class="badge">0.6s</span>
                        </div>
                        <input type="range" id="duration-slider" min="0.1" max="3" step="0.1" value="0.6" class="slider">
                    </div>

                    <div class="param-group">
                        <div class="param-header">
                            <span>Delay</span>
                            <span id="delay-val" class="badge">0s</span>
                        </div>
                        <input type="range" id="delay-slider" min="0" max="2" step="0.1" value="0" class="slider">
                    </div>

                    <div class="param-group">
                        <label class="param-label">Easing</label>
                        <select id="easing-selector" class="select-input">
                            <!-- Populated by JS -->
                        </select>
                    </div>

                    <div class="param-group">
                        <label class="param-label">Repeat</label>
                        <div class="toggle-group" id="repeat-selector">
                            <button class="toggle-btn active" data-val="0">None</button>
                            <button class="toggle-btn" data-val="1">1</button>
                            <button class="toggle-btn" data-val="-1">Inf</button>
                        </div>
                    </div>
                </section>
            </div>

            <div class="sidebar-footer">
                <button id="replay-btn" class="primary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Replay Animation
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
                    <span class="breadcrumb-text">Preview</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sep"><polyline points="9 18 15 12 9 6"/></svg>
                    <span id="current-element-label" class="breadcrumb-active">Card Animation</span>
                </div>

                <div class="actions">
                    <button id="toggle-code-btn" class="secondary-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                        View Code
                    </button>
                    <button id="copy-code-btn" class="secondary-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        Copy Code
                    </button>
                </div>
            </header>

            <div class="preview-area">
                <div class="grid-bg"></div>
                <div id="preview-container" class="preview-container">
                    <!-- Element rendered here -->
                </div>

                <!-- Code Overlay -->
                <div id="code-overlay" class="code-overlay hidden">
                    <div class="code-header">
                        <div class="window-controls">
                            <span class="dot red"></span>
                            <span class="dot amber"></span>
                            <span class="dot green"></span>
                        </div>
                        <span class="filename">animation.css</span>
                        <button id="close-code-btn" class="close-btn">&times;</button>
                    </div>
                    <div class="code-body">
                        <pre id="code-output"></pre>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
